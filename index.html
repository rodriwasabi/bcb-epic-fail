<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificador de Billetes</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -500px;
      right: 0;
      bottom: 0;
      background-image: var(--bill-bg);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.12;
      pointer-events: none;
      transition: background-image 0.3s;
    }

    .lang-switch {
      display: flex;
      justify-content: flex-end;
      gap: 0.3rem;
      margin-bottom: 0.5rem;
    }

    .lang-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0.15rem 0.4rem;
      font-size: 0.75rem;
      color: #888;
      cursor: pointer;
    }

    .lang-btn:hover {
      border-color: #4a90d9;
      color: #4a90d9;
    }

    .lang-btn.active {
      background: #4a90d9;
      border-color: #4a90d9;
      color: #fff;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      color: #333;
    }

    .bills {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .bill-card {
      flex: 1;
      padding: 0.8rem 0.5rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      font-weight: 600;
      color: #555;
      transition: all 0.15s;
    }

    .bill-card:hover {
      border-color: #4a90d9;
      color: #4a90d9;
    }

    .bill-card.selected {
      border-color: #4a90d9;
      background: #4a90d9;
      color: #fff;
    }

    .inputs {
      display: flex;
      gap: 0.5rem;
    }


    #serial {
      flex: 1;
      width: 200px;
    }

    #B {
      width: 3.5rem;
      flex-shrink: 0;
    }

    input {
      font-size: 1.8rem;
      text-align: center;
      letter-spacing: 0.15em;
      padding: 0.5rem;
      border: 2px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input:focus {
      border-color: #4a90d9;
    }

    .buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1rem;
    }

    button {
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #4a90d9;
      color: #fff;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #3a7bc8;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: none;
      border: 1px solid #ccc;
      color: #555;
      font-size: 0.85rem;
      padding: 0.4rem 1rem;
    }

    .btn-secondary:hover {
      background: #f0f0f0;
    }

    #result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      display: none;
    }

    #result.safe {
      background: #e6f9e6;
      color: #1a7a1a;
    }

    #result.danger {
      background: #fce4e4;
      color: #c0392b;
    }

    #history {
      margin-top: 1.5rem;
      text-align: left;
      font-size: 0.9rem;
    }

    #history .entry {
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    #history .entry.safe {
      background: #e6f9e6;
      color: #1a7a1a;
    }

    #history .entry.danger {
      background: #fce4e4;
      color: #c0392b;
      cursor: pointer;
    }

    #ranges {
      margin-top: 1.5rem;
      text-align: left;
    }

    #ranges summary {
      font-size: 1rem;
      font-weight: 600;
      color: #333;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }

    #ranges table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    #ranges th {
      background: #f0f0f0;
      padding: 0.4rem 0.6rem;
      text-align: left;
      font-weight: 600;
      color: #555;
    }

    #ranges td {
      padding: 0.3rem 0.6rem;
      border-bottom: 1px solid #eee;
      font-family: monospace;
    }

    #ranges tr.highlight td {
      background: #fce4e4;
      font-weight: 700;
    }

    .card-link {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 2rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
      font-size: 0.85rem;
      color: #555;
    }

    .card-link a {
      color: #4a90d9;
      text-decoration: none;
      font-weight: 600;
    }

    .card-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="lang-switch">
      <span class="lang-btn active" onclick="setLang('es')">ES</span>
      <span class="lang-btn" onclick="setLang('pt')">PT</span>
      <span class="lang-btn" onclick="setLang('en')">EN</span>
    </div>
    <h1 id="title">Verificador de Billetes</h1>
    <div class="bills">
      <div class="bill-card selected" data-bill="10" onclick="selectBill(this)">Bs 10</div>
      <div class="bill-card" data-bill="20" onclick="selectBill(this)">Bs 20</div>
      <div class="bill-card" data-bill="50" onclick="selectBill(this)">Bs 50</div>
    </div>
    <div class="inputs">
      <input id="serial" type="text" inputmode="numeric" maxlength="9" placeholder="000000000" autocomplete="off"
        autofocus>
      <input id="B" type="text" placeholder="B" autocomplete="off" disabled>
    </div>
    <div class="buttons">
      <button id="btnCheck" onclick="check()" disabled>Verificar</button>
      <button id="btnOtro" class="btn-secondary" onclick="otro()">Otro billete</button>
    </div>
    <div id="result"></div>
    <div id="history"></div>
    <div style="display:flex;align-items:baseline;gap:0.5rem;">
      <div id="ranges" style="flex:1;"></div>
      <a id="sourceLink"
        href="https://www.bcb.gob.bo/webdocs/files_noticias/28feb26%20CP%209%20BCB%20levanta%20inhabilitaci%C3%B3n%20Serie%20B.PDF"
        target="_blank" rel="noopener"
        style="font-size:0.75rem;color:#4a90d9;text-decoration:none;white-space:nowrap;">Fuente</a>
    </div>
  </div>

  <div class="card-link">
    <span id="officialText">Verificador oficial, por si quieres sumar y restar</span>
    <br>
    <a href="https://www.bcb.gob.bo/?q=content/verificador-de-n%C3%BAmero-de-serie" target="_blank"
      rel="noopener">bcb.gob.bo</a>
  </div>

  <a href="https://rodriwasabi.github.io/resume/" target="_blank" rel="noopener"
    style="font-size:0.7rem;color:#bbb;text-decoration:none;">@rodriwasabi</a>

  <script>
    const i18n = {
      es: {
        title: 'Verificador de Billetes',
        check: 'Verificar',
        another: 'Otro billete',
        enter9: 'Ingrese exactamente 9 números.',
        invalid: 'NO VALIDO: Billete de',
        valid: 'Válido',
        noRanges: 'Sin rangos registrados.',
        ranges: 'Rangos Bs',
        from: 'Desde',
        to: 'Hasta',
        historyInvalid: 'NO VALIDO',
        historyValid: 'VALIDO',
        official: 'Verificador oficial, por si quieres sumar y restar',
        source: 'Fuente',
      },
      pt: {
        title: 'Verificador de Cédulas',
        check: 'Verificar',
        another: 'Outra cédula',
        enter9: 'Digite exatamente 9 números.',
        invalid: 'INVÁLIDA: Cédula de',
        valid: 'Válida',
        noRanges: 'Sem faixas registradas.',
        ranges: 'Faixas Bs',
        from: 'De',
        to: 'Até',
        historyInvalid: 'INVÁLIDA',
        historyValid: 'VÁLIDA',
        official: 'Verificador oficial, caso queira somar e subtrair',
        source: 'Fonte',
      },
      en: {
        title: 'Bill Checker',
        check: 'Check',
        another: 'Next bill',
        enter9: 'Enter exactly 9 digits.',
        invalid: 'INVALID: Bill of',
        valid: 'Valid',
        noRanges: 'No ranges registered.',
        ranges: 'Ranges Bs',
        from: 'From',
        to: 'To',
        historyInvalid: 'INVALID',
        historyValid: 'VALID',
        official: 'Official checker, in case you want to add and subtract',
        source: 'Source',
      },
    };

    let lang = 'es';
    function t(key) { return i18n[lang][key]; }

    const blacklist = [
      {
        bill: 10,
        ranges: [
          [67250001, 67700000],
          [69050001, 69500000],
          [69500001, 69950000],
          [69950001, 70400000],
          [70400001, 70850000],
          [70850001, 71300000],
          [76310012, 85139995],
          [86400001, 86850000],
          [90900001, 91350000],
          [91800001, 92250000],
        ]
      },
      {
        bill: 20, ranges: [
          [87280145, 91646549],
          [96650001, 97100000],
          [99800001, 100250000],
          [100250001, 100700000],
          [109250001, 109700000],
          [110600001, 111050000],
          [111050001, 111500000],
          [111950001, 112400000],
          [112400001, 112850000],
          [112850001, 113300000],
          [114200001, 114650000],
          [114650001, 115100000],
          [115100001, 115550000],
          [118700001, 119150000],
          [119150001, 119600000],
          [120500001, 120950000]
        ]
      },
      {
        bill: 50, ranges: [
          [77100001, 77550000],
          [78000001, 78450000],
          [78900001, 96350000],
          [96350001, 96800000],
          [96800001, 97250000],
          [98150001, 98600000],
          [104900001, 105350000],
          [105350001, 105800000],
          [106700001, 107150000],
          [107600001, 107150000],
          [108050001, 108500000],
          [109400001, 109850000],
        ]
      },
    ];

    let selectedBillValue = 10;
    const serialInput = document.getElementById('serial');
    const result = document.getElementById('result');
    const historyDiv = document.getElementById('history');
    const rangesDiv = document.getElementById('ranges');
    const btnCheck = document.getElementById('btnCheck');
    const btnOtro = document.getElementById('btnOtro');
    const titleEl = document.getElementById('title');

    const officialText = document.getElementById('officialText');
    const sourceLink = document.getElementById('sourceLink');

    function setLang(l) {
      lang = l;
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
      titleEl.textContent = t('title');
      btnCheck.textContent = t('check');
      btnOtro.textContent = t('another');
      officialText.textContent = t('official');
      sourceLink.textContent = t('source');
      result.style.display = 'none';
      renderRanges();
    }

    function renderRanges(highlightSerial) {
      const entry = blacklist.find(e => e.bill === selectedBillValue);
      if (!entry || entry.ranges.length === 0) {
        rangesDiv.innerHTML = '<details><summary>' + t('ranges') + selectedBillValue + '</summary><p style="font-size:0.85rem;color:#999;">' + t('noRanges') + '</p></details>';
        return;
      }
      const open = highlightSerial ? ' open' : '';
      let html = '<details' + open + '><summary>' + t('ranges') + entry.bill + '</summary><table><tr><th>' + t('from') + '</th><th>' + t('to') + '</th></tr>';
      for (const [lo, hi] of entry.ranges) {
        const match = highlightSerial && highlightSerial >= pad9(lo) && highlightSerial <= pad9(hi);
        html += '<tr' + (match ? ' class="highlight"' : '') + '><td>' + pad9(lo) + '</td><td>' + pad9(hi) + '</td></tr>';
      }
      html += '</table></details>';
      rangesDiv.innerHTML = html;
    }

    const cardEl = document.querySelector('.card');

    function updateBillBg() {
      cardEl.style.setProperty('--bill-bg', 'url(' + selectedBillValue + '.jpg)');
    }

    function selectBill(el) {
      document.querySelectorAll('.bill-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
      selectedBillValue = parseInt(el.dataset.bill, 10);
      updateBillBg();
      renderRanges();
    }

    serialInput.addEventListener('input', () => {
      serialInput.value = serialInput.value.replace(/\D/g, '').slice(0, 9);
      btnCheck.disabled = serialInput.value.length !== 9;
    });

    serialInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') check();
    });

    function pad9(n) {
      return String(n).padStart(9, '0');
    }

    const checkedSet = new Set();

    function addHistory(bill, serial, blocked) {
      const key = `${bill}-${serial}`;
      if (checkedSet.has(key)) return;
      checkedSet.add(key);
      const div = document.createElement('div');
      div.className = 'entry ' + (blocked ? 'danger' : 'safe');
      div.textContent = `Bs${bill}: ${serial} - ${blocked ? t('historyInvalid') : t('historyValid')}`;
      if (blocked) {
        div.dataset.bill = bill;
        div.dataset.serial = serial;
        div.addEventListener('click', () => {
          const billCard = document.querySelector(`.bill-card[data-bill="${bill}"]`);
          if (billCard) selectBill(billCard);
          renderRanges(serial);
        });
      }
      historyDiv.prepend(div);
    }

    function otro() {
      serialInput.value = '';
      btnCheck.disabled = true;
      result.style.display = 'none';
      renderRanges();
      serialInput.focus();
    }

    function check() {
      const val = serialInput.value;
      if (val.length !== 9) {
        result.style.display = 'block';
        result.className = 'danger';
        result.textContent = t('enter9');
        return;
      }

      const entry = blacklist.find(e => e.bill === selectedBillValue);

      if (entry) {
        for (const [lo, hi] of entry.ranges) {
          if (val >= pad9(lo) && val <= pad9(hi)) {
            result.style.display = 'block';
            result.className = 'danger';
            result.textContent = `${t('invalid')} ${entry.bill}`;
            addHistory(entry.bill, val, true);
            return;
          }
        }
      }

      result.style.display = 'block';
      result.className = 'safe';
      result.textContent = t('valid');
      addHistory(selectedBillValue, val, false);
    }

    updateBillBg();
    renderRanges();
  </script>
</body>

</html>
